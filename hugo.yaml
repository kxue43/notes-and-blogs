baseURL: "https://kxue43.github.io/notes-and-blogs/"
locale: "en-us"
title: 佐藤 清之介

module:
  imports:
    - path: "github.com/kxue43/seinosuke"

menus:
  main:
    - name: "Blogs"
      pageRef: "/blogs/"
      weight: 20
    - name: "Notes"
      pageRef: "/notes/"
      weight: 30
    - name: "Novels"
      pageRef: "/novels/"
      weight: 40
